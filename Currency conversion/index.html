<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<title>Currency conversion</title>
</head>
<body>
    <form >
        <fieldset>
   <legend align="center"><h1>Currency Converter</h1></legend> 

     
    <input type="number" id="amount" placeholder="Nhập số tiền">

    <select id="fromCurrency">
        <option value="USD">USD</option>
        <option value="VND">VND</option>
        <option value="EUR">EUR</option>
         <option value="JPY">SAR</option>
    </select>

    <select id="toCurrency">
        <option value="VND">VND</option>
        <option value="USD">USD</option>
         <option value="EUR">EUR</option>
         <option value="JPY">SAR </option>
    </select>
   
   <button type="button" onclick="convertMoney()"  style="background-color: rgb(0, 255, 213);">Convert</button>
</fieldset>
    </form>
    <h2 id="result"></h2>

    <script src="main.js"></script>
</body>
</html>
